<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Spring AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body { background: #f4f6f9; min-height: 100vh; }

        nav {
            background: #fff;
            border-bottom: 1px solid #ddd;
            padding: 16px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        nav a {
            padding: 10px 28px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            color: #555;
            background: #eee;
            transition: all 0.2s;
        }

        nav a.active, nav a:hover {
            background: #2563eb;
            color: #fff;
        }

        .container {
            max-width: 780px;
            margin: 48px auto;
            padding: 0 20px;
        }

        h1 { text-align: center; font-size: 2rem; margin-bottom: 28px; color: #1e293b; }

        textarea, input[type=text] {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            resize: vertical;
        }

        button {
            display: block;
            margin: 16px auto 0;
            padding: 12px 40px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #1d4ed8; }

        .response-box {
            margin-top: 28px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            white-space: pre-wrap;
            line-height: 1.7;
            color: #334155;
        }

        .label { font-weight: 600; color: #64748b; margin-bottom: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav>
    <a href="/image">Image Generator</a>
    <a href="/chat" class="active">Chat</a>
    <a href="/recipe">Recipe Generator</a>
</nav>

<div class="container">
    <h1>Talk to AI</h1>

    <form method="post" action="/chat">
        <textarea name="prompt" rows="4" placeholder="Ask me anything..." th:text="${prompt}"></textarea>
        <button type="submit">Ask AI</button>
    </form>

    <div class="response-box" th:if="${response}">
        <div class="label">AI Response:</div>
        <span th:text="${response}"></span>
    </div>
</div>

</body>
</html>
